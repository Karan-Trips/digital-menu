<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KarQR — Digital Menu for Restaurants</title>
  <meta name="description"
    content="KarQR — Digital QR Menu for restaurants and hotels. Scan QR, view menu, order easy.">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #7b1e12 0%, #c84b2f 55%, #ff8c42 100%);
      color: #fff;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Animated background circles */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: .08;
      animation: drift 12s ease-in-out infinite;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: #fff;
      top: -200px;
      left: -200px;
      animation-delay: 0s;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: #fff;
      bottom: -150px;
      right: -100px;
      animation-delay: 6s;
    }

    @keyframes drift {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      50% {
        transform: translate(30px, 20px) scale(1.05)
      }
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, .1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 24px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
      position: relative;
      z-index: 2;
      animation: slideUp .6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .logo-icon {
      font-size: 52px;
      margin-bottom: 10px;
      display: block;
      animation: wobble 3s ease-in-out infinite
    }

    @keyframes wobble {

      0%,
      100% {
        transform: rotate(-3deg)
      }

      50% {
        transform: rotate(3deg)
      }
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .logo-sub {
      font-size: .88rem;
      opacity: .85;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .divider {
      width: 50px;
      height: 3px;
      background: rgba(255, 255, 255, .5);
      border-radius: 2px;
      margin: 16px auto 28px;
    }

    .features {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .feat {
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 15px 24px;
      margin-bottom: 12px;
      background: #fff;
      color: #C84B2F;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: transform .15s, box-shadow .15s;
      text-decoration: none;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .2)
    }

    .btn-primary:active {
      transform: translateY(0)
    }

    .btn-secondary {
      display: block;
      width: 100%;
      padding: 14px 24px;
      background: rgba(0, 0, 0, .25);
      color: #fff;
      border: 1.5px solid rgba(255, 255, 255, .3);
      border-radius: 14px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background .2s, transform .15s;
      text-decoration: none;
    }

    .btn-secondary:hover {
      background: rgba(0, 0, 0, .4);
      transform: translateY(-1px)
    }

    .powered {
      margin-top: 28px;
      font-size: .72rem;
      opacity: .6;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Floating WhatsApp */
    .wa-fab {
      position: fixed;
      bottom: 22px;
      right: 22px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #25D366;
      border: none;
      color: #fff;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 0, 0, .35);
      transition: transform .2s, box-shadow .2s;
      z-index: 99;
      text-decoration: none;
      animation: pulse 2.5s infinite;
    }

    .wa-fab:hover {
      transform: scale(1.1)
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 6px 20px rgba(0, 0, 0, .35), 0 0 0 0 rgba(37, 211, 102, .4)
      }

      50% {
        box-shadow: 0 6px 20px rgba(0, 0, 0, .35), 0 0 0 10px rgba(37, 211, 102, 0)
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <span class="logo-icon">📱</span>
    <div class="logo-text">KarQR</div>
    <div class="logo-sub">Digital Menu · Scan QR · Hotels</div>
    <div class="divider"></div>

    <div class="features">
      <span class="feat">🍽 View Menu</span>
      <span class="feat">📲 QR Ready</span>
      <span class="feat">✅ Pure Veg</span>
    </div>

    <a href="menu.html" class="btn-primary">🍽 See Our Menu</a>
    <a href="https://wa.me/916238093007?text=Hello%20I%20want%20Custom%20QR%20Menu" target="_blank"
      class="btn-secondary">📞 Contact for Custom QR</a>

    <p class="powered">Powered by Karan Smart Menu</p>
  </div>

  <!-- Floating WhatsApp button -->
  <a href="https://wa.me/916238093007?text=Hello%20I%20want%20Custom%20QR%20Menu" target="_blank" class="wa-fab"
    title="Chat on WhatsApp">💬</a>

</body>

</html>
